<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apollo – Games</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="index.css">
</head>

<body class="custom-cursor">
    <nav class="glass">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor: pointer; font-weight: 800; font-size: 1.5rem; letter-spacing: 2px;">
            APOLLO
        </div>
        <div class="nav-links">
            <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
            <a href="play.html"><i class="fa-solid fa-gamepad"></i> Games</a>
            <a href="apps.html"><i class="fa-solid fa-rocket"></i> Apps</a>
            <a href="unblocker/index.html"><i class="fa-solid fa-unlock"></i> Unblocker</a>
            <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
        </div>
    </nav>

    <main class="container">
        <header style="text-align: center; margin-bottom: 50px;">
            <h1 style="font-size: 3rem; font-weight: 800; margin-bottom: 15px;">Discover <span style="color: var(--accent-color);">Games</span></h1>
            <p style="color: var(--text-secondary);">Browse our collection of hand-picked unblocked games.</p>
        </header>

        <div style="display: flex; justify-content: center; margin-bottom: 40px;">
            <div class="glass" style="padding: 5px 15px; display: flex; align-items: center; width: 100%; max-width: 500px;">
                <i class="fa-solid fa-magnifying-glass" style="color: var(--text-secondary); margin-right: 15px;"></i>
                <input type="text" id="search" placeholder="Search games..." style="background: none; border: none; color: var(--text-primary); padding: 10px 0; width: 100%; outline: none; font-size: 1rem;">
            </div>
        </div>

        <div class="grid" id="gameList">
        </div>
    </main>

    <div class="iframe-overlay glass" id="iframeOverlay" style="display: none; position: fixed; inset: 0; z-index: 9999; justify-content: center; align-items: center; background: rgba(0,0,0,0.9);">
        <div style="position: absolute; top: 20px; right: 20px; display: flex; gap: 15px; z-index: 10000;">
            <button id="fullscreenBtn" class="btn btn-outline" style="padding: 10px;"><i class="fa-solid fa-expand"></i></button>
            <button id="closeBtn" class="btn btn-primary" style="padding: 10px;"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="iframeContainer" style="width: 90vw; height: 85vh; display: flex; justify-content: center; align-items: center;"></div>
    </div>

    <footer class="glass" style="margin-top: 100px; padding: 40px 0; border-radius: 0;">
        <div class="container" style="margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 20px;">
                <h2 style="font-weight: 900; letter-spacing: 2px;">APOLLO</h2>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="play.html">Games</a>
                    <a href="apps.html">Apps</a>
                    <a href="https://discord.gg/3V2m5zzQDN" target="_blank">Discord</a>
                </div>
            </div>
            <div style="color: var(--text-secondary); font-size: 0.9rem;">
                &copy; 2026 Owned by <strong>Apollo Team</strong> | <span style="color: #00ff88;">●</span> All games online
            </div>
        </div>
    </footer>

    <script src="performance.js"></script>
    <script>
        const searchInput = document.getElementById('search');
        const gameList = document.getElementById('gameList');
        const overlay = document.getElementById('iframeOverlay');
        const closeBtn = document.getElementById('closeBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const iframeContainer = document.getElementById('iframeContainer');

        let currentIframe = null;

        function createFreshIframe() {
            iframeContainer.innerHTML = '';
            const iframe = document.createElement('iframe');
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            iframe.style.borderRadius = '8px';
            iframe.style.background = '#000';
            iframe.allow = 'autoplay; fullscreen; gamepad; accelerometer; gyroscope; pointer-lock; microphone';
            iframeContainer.appendChild(iframe);
            currentIframe = iframe;
            return iframe;
        }

        const priorityGames = ["[!] REQUEST GAME", "R0blox", "F0rtnite"];
        const gamesUrls = ['data/games.json', 'https://raw.githubusercontent.com/ten8mystery/Vertex-Gold/main/data/games.json'];

        async function fetchFirstJson(urls) {
            let lastErr = null;
            for (const url of urls) {
                try {
                    const res = await fetch(url, { cache: 'no-store' });
                    if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
                    return await res.json();
                } catch (e) {
                    lastErr = e;
                }
            }
            throw lastErr ?? new Error('Failed to load JSON');
        }

        fetchFirstJson(gamesUrls).then(data => {
            gameList.innerHTML = '';
            data.sort((a, b) => {
                const ai = priorityGames.indexOf(a.name);
                const bi = priorityGames.indexOf(b.name);
                if (ai !== -1 && bi !== -1) return ai - bi;
                if (ai !== -1) return -1;
                if (bi !== -1) return 1;
                return a.name.localeCompare(b.name);
            });

            data.forEach(game => {
                const card = document.createElement('div');
                card.className = 'glass-card';
                card.style.padding = '15px';
                card.style.display = 'flex';
                card.style.flexDirection = 'column';
                card.style.gap = '15px';
                card.dataset.name = game.name;

                card.innerHTML = `
                    <div style="width: 100%; height: 160px; border-radius: 6px; overflow: hidden;">
                        <img src="${game.image}" alt="${game.name}" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <h3 style="font-size: 1.1rem; text-align: center;">${game.name}</h3>
                    <button class="btn btn-primary" style="width: 100%;">Play Now</button>
                `;

                card.querySelector('.btn').onclick = () => {
                    overlay.style.display = 'flex';
                    const iframe = createFreshIframe();
                    iframe.src = game.src;
                };

                gameList.appendChild(card);
            });
        });

        searchInput.oninput = () => {
            const q = searchInput.value.toLowerCase();
            document.querySelectorAll('.glass-card').forEach(g => {
                if(g.dataset.name) {
                    g.style.display = g.dataset.name.toLowerCase().includes(q) ? 'flex' : 'none';
                }
            });
        };

        closeBtn.onclick = () => {
            overlay.style.display = 'none';
            if (currentIframe) currentIframe.src = 'about:blank';
            iframeContainer.innerHTML = '';
            currentIframe = null;
        };

        fullscreenBtn.onclick = () => {
            if (currentIframe) {
                if (currentIframe.requestFullscreen) currentIframe.requestFullscreen();
                else if (currentIframe.webkitRequestFullscreen) currentIframe.webkitRequestFullscreen();
                else if (iframeContainer.requestFullscreen) iframeContainer.requestFullscreen();
            }
        };

        overlay.onclick = (e) => { if (e.target === overlay) closeBtn.onclick(); };
    </script>
</body>

</html>
