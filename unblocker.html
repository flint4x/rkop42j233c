<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <script src="auth-check.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apollo – Unblocker</title>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #050505;
      --panel: #0b1220;
      --text: #ffffff;
      --muted: #94a3b8;
      --apollo-1: #60a5fa;
      --apollo-2: #818cf8;
      --apollo-3: #a78bfa;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      backdrop-filter: blur(14px);
      background: rgba(5, 5, 5, .7);
      border-bottom: 1px solid rgba(96, 165, 250, .16);
      z-index: 50;
    }

    .nav {
      max-width: 1300px;
      margin: auto;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      height: 40px;
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .logo img {
      height: 100%;
      width: auto;
      transition: transform 0.2s;
    }

    .logo:hover img {
      transform: scale(1.05);
    }

    .nav a button {
      background: linear-gradient(135deg, var(--apollo-1), var(--apollo-3));
      border: none;
      padding: 12px 22px;
      border-radius: 14px;
      font-weight: 800;
      cursor: pointer;
      color: #fff;
      box-shadow: 0 0 35px rgba(96, 165, 250, .35);
      transition: transform .25s, box-shadow .25s;
    }

    .nav a button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 45px rgba(96, 165, 250, .5);
    }

    .container {
      flex-grow: 1;
      position: relative;
    }

    iframe {
      border: none;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>

<body>
  <header>
    <div class="nav">
      <div class="logo" onclick="window.location.href='index.html'"><img src="images/logo.png" alt="Apollo"></div>
      <div style="display:flex; gap:14px;">
        <a href="index.html"><button><i class="fa-solid fa-house" style="margin-right:5px;"></i>Home</button></a>
        <a href="play.html"><button><i class="fa-solid fa-gamepad" style="margin-right:5px;"></i>Games</button></a>
        <a href="apps.html"><button><i class="fa-solid fa-rocket" style="margin-right:5px;"></i>Apps</button></a>
        <a href="unblocker.html"><button><i class="fa-solid fa-unlock"
              style="margin-right:5px;"></i>Unblocker</button></a>
        <a href="admin.html" id="adminNavBtn" style="display:none;"><button><i class="fa-solid fa-shield-halved"
              style="margin-right:5px;"></i>Admin</button></a>
        <a href="settings.html"><button><i class="fa-solid fa-gear" style="margin-right:5px;"></i>Settings</button></a>
        <a href="login.html"><button id="loginNavBtn"><i class="fa-solid fa-user"
              style="margin-right:5px;"></i>Login</button></a>
      </div>
    </div>
  </header>

  <div class="container">
    <iframe src="https://storage.googleapis.com/fernisbest/index.html"></iframe>
  </div>

  <script>
    (function initUI() {
      const session = JSON.parse(localStorage.getItem('apollo_session') || 'null');
      const btn = document.getElementById('loginNavBtn');
      const adminBtn = document.getElementById('adminNavBtn');
      if (session && btn) {
        btn.innerHTML = `<i class="fa-solid fa-user" style="margin-right:5px;"></i>${session.username}`;
        if (session.role === 'admin' && adminBtn) adminBtn.style.display = 'inline-block';
      }
    })();
  </script>
</body>

</html>
