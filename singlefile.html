<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apollo - Hub</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="index.css">
</head>

<body class="custom-cursor">
    <nav class="glass">
        <div class="logo" onclick="switchView('home')" style="cursor: pointer; font-weight: 800; font-size: 1.5rem; letter-spacing: 2px;">
            APOLLO
        </div>
        <div class="nav-links">
            <button onclick="switchView('home')" class="glass">Hub</button>
            <button onclick="switchView('games')" class="glass">Games</button>
            <button onclick="switchView('apps')" class="glass">Apps</button>
        </div>
    </nav>

    <div id="view-home" class="view-section active">
        <section class="hero container">
            <div class="hero-content">
                <h1>Apollo <span style="color: var(--accent-color);">Hub</span></h1>
                <p>Explore games and apps in a clean, fast hub. Optimized for all devices.</p>
                <div class="hero-btns">
                    <button class="btn btn-primary" onclick="switchView('games')">Get Started</button>
                    <button class="btn btn-outline" onclick="cloakTab()">Cloak Tab</button>
                </div>
            </div>
            <div class="glass-card" style="padding: 30px; min-width: 300px;">
                <h3 style="color: var(--accent-color); margin-bottom: 20px;">Platform Stats</h3>
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <div style="display: flex; justify-content: space-between;">
                        <span style="color: var(--text-secondary);">Games</span>
                        <strong id="game-total">...</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span style="color: var(--text-secondary);">Status</span>
                        <strong style="color: #00ff88;">Online</strong>
                    </div>
                </div>
            </div>
        </section>

        <section class="container" style="margin-top: 50px;">
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 30px;">
                <h2 style="font-size: 0.9rem; color: var(--accent-color); text-transform: uppercase; letter-spacing: 2px;">Featured Games</h2>
                <div style="height: 1px; background: var(--border-color); flex: 1;"></div>
            </div>
            <div id="game-scroller" style="display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none;">
                <!-- Scroller items -->
            </div>
        </section>
    </div>

    <div id="view-games" class="view-section">
        <section class="container" style="padding-top: 50px;">
            <h1 style="text-align: center; margin-bottom: 30px;">Games</h1>
            <div style="max-width: 500px; margin: 0 auto 40px;">
                <input type="text" id="search-games" class="glass" placeholder="Search games..." style="width: 100%; padding: 15px 20px; border-radius: 12px; color: var(--text-primary); outline: none;">
            </div>
            <div class="grid" id="gameList"></div>
        </section>
    </div>

    <div id="view-apps" class="view-section">
        <section class="container" style="padding-top: 50px;">
            <h1 style="text-align: center; margin-bottom: 30px;">Apps</h1>
            <div style="max-width: 500px; margin: 0 auto 40px;">
                <input type="text" id="search-apps" class="glass" placeholder="Search apps..." style="width: 100%; padding: 15px 20px; border-radius: 12px; color: var(--text-primary); outline: none;">
            </div>
            <div class="grid" id="appList"></div>
        </section>
    </div>

    <div class="iframe-overlay" id="iframeOverlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; flex-direction: column;">
        <div style="display: flex; justify-content: center; gap: 20px; padding: 20px;">
            <button class="btn btn-outline" onclick="closeIframe()">Close ✕</button>
            <button class="btn btn-primary" onclick="fullscreenIframe()">Fullscreen ⛶</button>
        </div>
        <div id="overlayContainer" style="flex: 1; padding: 20px;">
            <iframe id="gameIframe" style="width: 100%; height: 100%; border: 1px solid var(--border-color); border-radius: 12px; background: #000;"></iframe>
        </div>
    </div>

    <footer class="glass" style="margin-top: 100px; padding: 40px 0;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
            <div>
                <div class="logo" style="font-weight: 800; font-size: 1.2rem; margin-bottom: 10px;">APOLLO</div>
                <p style="color: var(--text-secondary); font-size: 0.9rem;">Clean. Fast. Secure.</p>
            </div>
            <div style="display: flex; gap: 30px;">
                <a href="#" onclick="switchView('home')" style="color: var(--text-secondary); text-decoration: none;">Hub</a>
                <a href="https://discord.gg/3V2m5zzQDN" target="_blank" style="color: var(--text-secondary); text-decoration: none;"><i class="fa-brands fa-discord"></i> Discord</a>
                <a href="#" style="color: var(--text-secondary); text-decoration: none;">DMCA</a>
            </div>
            <div style="color: var(--text-secondary); font-size: 0.8rem;">
                &copy; 2026 Apollo. All rights reserved.
            </div>
        </div>
    </footer>

    <script src="performance.js"></script>
    <script>
        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            window.scrollTo(0, 0);
        }

        const urls = {
            games: ['data/games.json', 'https://raw.githubusercontent.com/ten8mystery/Vertex-Gold/main/data/games.json'],
            apps: ['data/apps.json', 'https://raw.githubusercontent.com/ten8mystery/Vertex-Gold/main/data/apps.json']
        };

        async function fetchFirstJson(urls) {
            for (const url of urls) {
                try {
                    const res = await fetch(url);
                    if (res.ok) return await res.json();
                } catch (e) {}
            }
            return [];
        }

        function renderGrid(containerId, data) {
            const container = document.getElementById(containerId);
            container.innerHTML = data.map(item => `
                <div class="glass-card" onclick="openIframe('${item.src}')">
                    <img src="${item.image}" alt="${item.name}" style="width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px; margin-bottom: 15px;">
                    <h4 style="text-align: center;">${item.name}</h4>
                </div>
            `).join('');
        }

        async function init() {
            const games = await fetchFirstJson(urls.games);
            const apps = await fetchFirstJson(urls.apps);

            document.getElementById('game-total').textContent = games.length;
            renderGrid('gameList', games);
            renderGrid('appList', apps);

            // Scroller
            const scroller = document.getElementById('game-scroller');
            scroller.innerHTML = games.slice(0, 8).map(game => `
                <div class="glass-card" style="min-width: 200px; cursor: pointer;" onclick="openIframe('${game.src}')">
                    <img src="${game.image}" alt="${game.name}" style="width: 100%; border-radius: 6px;">
                    <p style="font-size: 0.8rem; margin-top: 10px; text-align: center;">${game.name}</p>
                </div>
            `).join('');
        }

        function openIframe(src) {
            const overlay = document.getElementById('iframeOverlay');
            const iframe = document.getElementById('gameIframe');
            iframe.src = src;
            overlay.style.display = 'flex';
        }

        function closeIframe() {
            const overlay = document.getElementById('iframeOverlay');
            const iframe = document.getElementById('gameIframe');
            iframe.src = 'about:blank';
            overlay.style.display = 'none';
        }

        function fullscreenIframe() {
            const iframe = document.getElementById('gameIframe');
            if (iframe.requestFullscreen) iframe.requestFullscreen();
        }

        function cloakTab() {
            const win = window.open();
            win.document.body.style.margin = "0";
            win.document.body.style.height = "100vh";
            const iframe = win.document.createElement("iframe");
            iframe.style.width = "100%"; iframe.style.height = "100%"; iframe.style.border = "none";
            iframe.src = window.location.href;
            win.document.body.appendChild(iframe);
        }

        document.getElementById('search-games').oninput = (e) => {
            const q = e.target.value.toLowerCase();
            document.querySelectorAll('#gameList .glass-card').forEach(c => {
                c.style.display = c.textContent.toLowerCase().includes(q) ? 'block' : 'none';
            });
        };

        document.getElementById('search-apps').oninput = (e) => {
            const q = e.target.value.toLowerCase();
            document.querySelectorAll('#appList .glass-card').forEach(c => {
                c.style.display = c.textContent.toLowerCase().includes(q) ? 'block' : 'none';
            });
        };

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>

</html>
